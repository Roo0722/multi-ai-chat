name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy app icons
        run: |
          RES=android/app/src/main/res
          cp public/icons/ic_launcher_mdpi.png     $RES/mipmap-mdpi/ic_launcher.png
          cp public/icons/ic_launcher_mdpi.png     $RES/mipmap-mdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_hdpi.png     $RES/mipmap-hdpi/ic_launcher.png
          cp public/icons/ic_launcher_hdpi.png     $RES/mipmap-hdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xhdpi.png    $RES/mipmap-xhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xhdpi.png    $RES/mipmap-xhdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xxhdpi.png   $RES/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xxhdpi.png   $RES/mipmap-xxhdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xxxhdpi.png  $RES/mipmap-xxxhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xxxhdpi.png  $RES/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
