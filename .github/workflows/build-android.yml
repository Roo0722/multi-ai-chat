name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy app icons
        run: |
          RES=android/app/src/main/res
          cp public/icons/ic_launcher_mdpi.png     $RES/mipmap-mdpi/ic_launcher.png
          cp public/icons/ic_launcher_mdpi.png     $RES/mipmap-mdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_hdpi.png     $RES/mipmap-hdpi/ic_launcher.png
          cp public/icons/ic_launcher_hdpi.png     $RES/mipmap-hdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xhdpi.png    $RES/mipmap-xhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xhdpi.png    $RES/mipmap-xhdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xxhdpi.png   $RES/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xxhdpi.png   $RES/mipmap-xxhdpi/ic_launcher_round.png
          cp public/icons/ic_launcher_xxxhdpi.png  $RES/mipmap-xxxhdpi/ic_launcher.png
          cp public/icons/ic_launcher_xxxhdpi.png  $RES/mipmap-xxxhdpi/ic_launcher_round.png
          rm -rf $RES/mipmap-anydpi-v26

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/nexus-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/nexus-release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-signed-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
